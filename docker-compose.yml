services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: policlinic
      POSTGRES_USER: policlinic
      POSTGRES_PASSWORD: policlinic
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./migrations/001_add_staff_password_and_vendor.sql:/docker-entrypoint-initdb.d/02_add_staff_password_and_vendor.sql:ro
      - ./migrations/002_add_lab_cost_to_income.sql:/docker-entrypoint-initdb.d/03_add_lab_cost_to_income.sql:ro
      - ./migrations/003_add_medicine_presets.sql:/docker-entrypoint-initdb.d/04_add_medicine_presets.sql:ro
      - ./migrations/004_add_patient_address.sql:/docker-entrypoint-initdb.d/05_add_patient_address.sql:ro
      - ./migrations/006_add_time_columns.sql:/docker-entrypoint-initdb.d/06_add_time_columns.sql:ro
      - ./migrations/007_add_salary_links.sql:/docker-entrypoint-initdb.d/07_add_salary_links.sql:ro
      - ./migrations/008_add_staff_roles.sql:/docker-entrypoint-initdb.d/08_add_staff_roles.sql:ro

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: policlinic
      DB_USER: policlinic
      DB_PASSWORD: policlinic
      SECRET_KEY: change-me
    volumes:
      - ./backend:/app/backend
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
